<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body style="background-color: black; color: beige;">
    <ul class="language">
        <li>Javascript</li>
    </ul>
</body>
<script>
    /* creating function for adding list items */
    function addLanguage(langName) {
        const li = document.createElement("li");
        li.innerHTML = `${langName}`
        document.querySelector(".language").appendChild(li);
    }

    addLanguage("python");
    addLanguage("rust");

    // More optimized function for large projects
    function addOptiLanguage(langName) {
        const li = document.createElement("li");
        li.appendChild(document.createTextNode(langName));
        document.querySelector(".language").appendChild(li);
    }

    addOptiLanguage("golang");

    // Edit
    const secondLan = document.querySelector("li:nth-child(2)");
    const newLi = document.createElement("li");
    newLi.textContent = "MOJO";
    secondLan.replaceWith(newLi);

    // Edit
   const firstLan = document.querySelector("li:nth-child(1)");
   const newLi1 = document.createElement("li");
   newLi1.textContent = "JAVA";
   firstLan.replaceWith(newLi1);

   // Remove
   const lastLan =document.querySelector("li:last-child");
   lastLan.remove();


</script>
</html>
